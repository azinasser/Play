<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | المنصة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(100px);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: move 15s infinite alternate ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.3); top: -10%; left: -10%; }
        .orb-2 { width: 350px; height: 350px; background: rgba(59, 130, 246, 0.25); bottom: -5%; right: -5%; animation-delay: -5s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.15); }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
            filter: brightness(1.1);
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="glass-container w-full max-w-lg p-10 rounded-[2.5rem] m-4">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-xl rotate-3">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            </div>
            <h1 class="text-3xl font-black mb-2">ابدأ رحلتك معنا</h1>
            <p class="text-gray-400">أنشئ حسابك المجاني في ثوانٍ معدودة</p>
        </div>

        <form onsubmit="handleSubmit(event)" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="input-group">
                    <label class="block text-sm text-gray-400 mb-2 mr-1">الاسم الأول</label>
                    <input type="text" placeholder="مثال: أحمد" required class="w-full px-5 py-3.5 rounded-2xl text-white">
                </div>
                <div class="input-group">
                    <label class="block text-sm text-gray-400 mb-2 mr-1">اسم العائلة</label>
                    <input type="text" placeholder="مثال: علي" required class="w-full px-5 py-3.5 rounded-2xl text-white">
                </div>
            </div>

            <div class="input-group">
                <label class="block text-sm text-gray-400 mb-2 mr-1">البريد الإلكتروني</label>
                <input type="email" placeholder="name@example.com" required class="w-full px-5 py-3.5 rounded-2xl text-white">
            </div>

            <div class="input-group">
                <label class="block text-sm text-gray-400 mb-2 mr-1">كلمة المرور</label>
                <input type="password" placeholder="••••••••" required class="w-full px-5 py-3.5 rounded-2xl text-white">
            </div>

            <div class="flex items-center gap-3 py-2">
                <input type="checkbox" id="terms" required class="w-5 h-5 rounded-md accent-blue-500 cursor-pointer">
                <label for="terms" class="text-sm text-gray-400 cursor-pointer hover:text-gray-300 transition-colors">أوافق على <span class="text-blue-400">الشروط والأحكام</span> وسياسة الخصوصية</label>
            </div>

            <button type="submit" class="w-full py-4 rounded-2xl btn-gradient text-white font-bold text-lg mt-4">
                إنشاء الحساب
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-4 bg-[#0f172a]/50 backdrop-blur-md text-gray-500">أو سجل عبر</span></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="social-btn py-3 rounded-2xl flex items-center justify-center gap-2 text-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
            <button class="social-btn py-3 rounded-2xl flex items-center justify-center gap-2 text-sm">
                <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </button>
        </div>

        <p class="text-center text-gray-500 text-sm">
            لديك حساب بالفعل؟ 
            <a href="#" class="text-blue-400 font-bold hover:underline">سجل دخولك الآن</a>
        </p>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            // إضافة تأثير بسيط عند الإرسال
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
            
            setTimeout(() => {
                btn.innerHTML = "تم إنشاء الحساب بنجاح!";
                btn.style.background = "#10b981";
            }, 1500);
        }

        // تفاعل الخلفية مع الماوس
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            document.querySelector('.orb-1').style.transform = `translate(${x}px, ${y}px)`;
            document.querySelector('.orb-2').style.transform = `translate(${-x}px, ${-y}px)`;
        });
    </script>
</body>
</html>
